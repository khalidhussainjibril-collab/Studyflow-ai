<!DOCTYPE html>
<html>
<head>
  <title>StudyFlow AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>StudyFlow AI</h2>
    <a href="index.html">🏠 Home</a>
    <a href="app.html">📊 Dashboard</a>
  </div>

  <!-- Main -->
  <div class="main">

    <h1>Dashboard</h1>

    <div class="card">
      <h2>⏱ Focus Timer</h2>
      <h1 id="time">25:00</h1>
      <button onclick="startTimer()">Start</button>
      <button onclick="resetTimer()">Reset</button>
      <p id="stats">Sessions Completed: 0</p>
    </div>

    <div class="card">
      <h2>📝 Tasks</h2>
      <input id="taskInput" placeholder="New task">
      <button onclick="addTask()">Add</button>
      <ul id="taskList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
