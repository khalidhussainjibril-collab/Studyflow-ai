<!DOCTYPE html>
<html>
<head>
  <title>StudyFlow AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>StudyFlow AI</h2>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<hr>

<div id="app" style="display:none;">
  <h1>Dashboard</h1>
  <h3 id="role"></h3>

  <button onclick="logout()">Logout</button>
</div>

<script>
/* =========================
   SUPABASE CONFIG
========================= */

const supabaseUrl = "https://yidssmdknaaubtjmilrm.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpZHNzbWRrbmFhdWJ0am1pbHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTU5MzksImV4cCI6MjA5NzAzMTkzOX0.S6EC_xUKmAulfWognx65pUZscEfaCEDJASGswJsNemk";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   ADMIN EMAIL
========================= */

const ADMIN_EMAIL = "khjibril28@gmail.com";

/* =========================
   SIGN UP
========================= */

window.signup = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  document.getElementById("status").innerText =
    error ? error.message : "Signup successful. Now login.";
};

/* =========================
   LOGIN
========================= */

window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  handleUser(data.user);
};

/* =========================
   USER HANDLER
========================= */

function handleUser(user) {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  const role = (user.email === ADMIN_EMAIL) ? "admin" : "user";

  document.getElementById("role").innerText =
    "Logged in as: " + role;
}

/* =========================
   LOGOUT
========================= */

window.logout = async function () {
  await supabase.auth.signOut();

  document.getElementById("auth").style.display = "block";
  document.getElementById("app").style.display = "none";
};
</script>

</body>
</html>
