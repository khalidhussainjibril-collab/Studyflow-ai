<!DOCTYPE html>
<html>
<head>
  <title>StudyFlow AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .signup { background: #22c55e; color: white; }
    .login { background: #3b82f6; color: white; }
    .logout { background: #ef4444; color: white; }

    #app { display: none; }
    #status { font-size: 12px; margin-top: 8px; color: #cbd5e1; }
  </style>
</head>

<body>

<div class="card" id="auth">
  <h2>StudyFlow AI</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="signup" onclick="signup()">Sign Up</button>
  <button class="login" onclick="login()">Login</button>

  <p id="status"></p>
</div>

<div class="card" id="app">
  <h2>Dashboard</h2>
  <h3 id="role"></h3>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const supabaseUrl = "https://yidssmdknaaubtjmilrm.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpZHNzbWRrbmFhdWJ0am1pbHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTU5MzksImV4cCI6MjA5NzAzMTkzOX0.S6EC_xUKmAulfWognx65pUZscEfaCEDJASGswJsNemk";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const ADMIN_EMAIL = "khjibril28@gmail.com";

window.signup = async function () {
  alert("Signup clicked");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  document.getElementById("status").innerText =
    error ? error.message : "Signup successful. Check email or login.";
};

window.login = async function () {
  alert("Login clicked");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  const role = (data.user.email === ADMIN_EMAIL) ? "admin" : "user";

  document.getElementById("role").innerText = "Role: " + role;
};

window.logout = async function () {
  await supabase.auth.signOut();

  document.getElementById("auth").style.display = "block";
  document.getElementById("app").style.display = "none";
};
</script>

</body>
</html>
