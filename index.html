<!DOCTYPE html>
<html>
<head>
  <title>StudyFlow AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="auth">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<hr>

<div id="app" style="display:none;">
  <h1>Dashboard</h1>
  <h3 id="role"></h3>
  <button onclick="logout()">Logout</button>
</div>

<script>
/* ======================
   SUPABASE SETUP (NEW KEY)
====================== */

const supabaseUrl = "https://YOUR-PROJECT.supabase.co";
const supabaseKey = "sb_publishable_Jrp5fALdn7gtwpHrT96UOQ_-SgWPmF";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* ======================
   ADMIN EMAIL
====================== */

const ADMIN_EMAIL = "khjibril28@gmail.com";

/* ======================
   SIGN UP
====================== */

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  document.getElementById("status").innerText =
    error ? error.message : "Signup successful. Check email or login.";
}

/* ======================
   LOGIN
====================== */

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  handleUser(data.user);
}

/* ======================
   USER HANDLING
====================== */

function handleUser(user) {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  const role = (user.email === ADMIN_EMAIL) ? "admin" : "user";

  document.getElementById("role").innerText =
    "Role: " + role;
}

/* ======================
   LOGOUT
====================== */

async function logout() {
  await supabase.auth.signOut();

  document.getElementById("auth").style.display = "block";
  document.getElementById("app").style.display = "none";
}
</script>

</body>
</html>
